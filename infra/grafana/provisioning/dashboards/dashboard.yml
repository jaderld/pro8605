# dashboard.yml
# Provisionnement automatique d'un dashboard exemple
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
providers:
  - name: 'InterviewFlow Dashboard'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /etc/grafana/dashboards_json
