version: '3.8'

services:
  # --- ML ENGINE & TRACKING ---
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.7.1
    container_name: pro8605_mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow/mlflow.db 
      --default-artifact-root /mlflow/artifacts 
      --host 0.0.0.0
    volumes:
      - ./storage/mlflow:/mlflow

  # --- DATABASE POSTGRESQL ---
  postgres:
    image: postgres:15
    container_name: pro8605_postgres
    environment:
      POSTGRES_DB: pro8605
      POSTGRES_USER: interviewuser
      POSTGRES_PASSWORD: interviewpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- BACKEND & UI (FastAPI sert le HTML/JS) ---
  api:
    build:
      context: .  # On remonte au root pour accéder à tout
      dockerfile: api/Dockerfile
    container_name: pro8605_api
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app/api           # Contient maintenant ton dossier /static (HTML/CSS/JS)
      - ./src:/app/src           # CRITIQUE : Le code source MLOps
      - ./storage:/app/storage   # Les modèles et les données simulées
      - ./config:/app/config     # Le settings.yaml
      - ./database:/app/database # La base de données
      - ./scripts:/app/scripts
      - hf_cache:/app/.cache/huggingface
      - torch_cache:/app/.cache/torch
      - whisper_cache:/app/.cache/whisper
    depends_on:
      - mlflow
      - postgres

  # --- MONITORING ---
  prometheus:
    image: prom/prometheus:latest
    container_name: pro8605_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus # Persistance des métriques

  grafana:
    image: grafana/grafana:latest
    container_name: pro8605_grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus
    volumes:
      - ./infra/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards_json:/etc/grafana/dashboards_json
      - grafana_data:/var/lib/grafana # Persistance des configs/users

volumes:
  prometheus_data:
  postgres_data:
  grafana_data:
  hf_cache:
  torch_cache:
  whisper_cache: