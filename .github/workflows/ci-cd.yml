name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          set -ex
          python -m pip install --upgrade pip
          pip install flake8
          # Installer torch CPU depuis l'index dédié (avant le reste)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          # Générer un requirements filtré (sans --extra-index-url)
          grep -v '^--extra-index-url' requirements.txt > requirements-ci.txt
          pip install -r requirements-ci.txt

      - name: Lint with flake8
        run: |
          flake8 . --config=.flake8

      - name: Run unit tests
        env:
          TRANSFORMERS_OFFLINE: '1'
          HF_HUB_OFFLINE: '1'
        run: |
          python -m unittest discover -s tests/unit -v

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (placeholder — à implémenter)
        run: |
          echo "✅ Tests passés. Ajouter ici : docker push / SSH deploy / etc."
