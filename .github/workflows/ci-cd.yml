# ============================================================================
# CI/CD Pipeline — PRO8605
# ============================================================================
# Workflow :
#   1. lint       → Vérification qualité du code (flake8)
#   2. test       → Tests unitaires + couverture + audit sécurité
#   3. docker     → Build & push de l'image Docker vers GitHub Container Registry
#
# Déclencheurs :
#   - Push sur main       → lint + test + docker (build & push)
#   - Pull request main   → lint + test uniquement
#   - Tag v*              → lint + test + docker (build & push avec tag version)
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

# ── Job 1 : Lint ─────────────────────────────────────────────────────────────
jobs:
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --config=.flake8

  # ── Job 2 : Tests + Couverture + Audit Sécurité ───────────────────────────
  test:
    name: "🧪 Tests"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libsndfile1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage pip-audit
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          TRANSFORMERS_OFFLINE: '1'
          HF_HUB_OFFLINE: '1'
        run: |
          python -m coverage run -m unittest discover -s tests/unit -v
          echo ""
          echo "=== Coverage Report ==="
          python -m coverage report -m --skip-empty
          python -m coverage xml -o coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Security audit (pip-audit)
        if: always()
        continue-on-error: true
        run: |
          echo "=== Dependency Vulnerability Scan ==="
          pip-audit --desc --output json || true

  # ── Job 3 : Docker Build & Push (GHCR) ────────────────────────────────────
  docker:
    name: "🐳 Docker Build & Push"
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
